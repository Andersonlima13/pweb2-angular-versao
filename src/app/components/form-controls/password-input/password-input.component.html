<div class="password-input-wrapper">

  <input
    class="input-field"
    [type]="showPassword ? 'text' : 'password'"
    [placeholder]="placeholder"
    [value]="value"
    (input)="onInput($event)"
    (blur)="onTouched()"
  />

  <button
    type="button"
    (click)="togglePasswordVisibility()">
    {{ showPassword ? '👁️' : '👁️‍🗨️' }}
  </button>

</div>
